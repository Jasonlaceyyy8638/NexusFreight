<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 56" role="img" aria-labelledby="nf-logo-title">
  <title id="nf-logo-title">NexusFreight</title>
  <!-- Midnight charcoal panel so white "Nexus" stays visible on light surfaces (e.g. Crisp) -->
  <rect width="256" height="56" rx="14" fill="#111315" />
  <text
    x="128"
    y="36"
    text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="26"
    font-weight="700"
    letter-spacing="-0.035em"
  >
    <tspan fill="#FFFFFF">Nexus</tspan><tspan fill="#1D4ED8">Freight</tspan>
  </text>
</svg>
