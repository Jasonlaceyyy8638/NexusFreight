<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1024" height="500" viewBox="0 0 1024 500" role="img" aria-label="Nexus Freight Driver">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0b0d"/>
      <stop offset="55%" stop-color="#0f1419"/>
      <stop offset="100%" stop-color="#152036"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.22"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="500" fill="url(#bg)"/>
  <path d="M640 0 H1024 V500 H480 Z" fill="url(#accent)"/>
  <rect x="0" y="494" width="1024" height="6" fill="#2563eb"/>
  <image href="nexusfreight-logo.png" x="72" y="118" width="360" height="360" preserveAspectRatio="xMidYMid meet"/>
  <text x="480" y="228" fill="#f1f5f9" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Ubuntu, sans-serif" font-size="52" font-weight="700">Driver</text>
  <text x="480" y="288" fill="#94a3b8" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Ubuntu, sans-serif" font-size="26" font-weight="500">Loads · map · dispatch</text>
  <text x="480" y="340" fill="#64748b" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Ubuntu, sans-serif" font-size="20" font-weight="400">NexusFreight for carriers</text>
</svg>
